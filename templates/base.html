<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - ТехноПроф</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">ТехноПроф</div>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Главная</a></li>
                <li><a href="{{ url_for('about') }}">О компании</a></li>
                <li><a href="{{ url_for('services') }}">Услуги</a></li>
                <li><a href="{{ url_for('contact') }}">Контакты</a></li>
                <li><a href="{{ url_for('view_doc') }}">Документы</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2024 ТехноПроф. Все права защищены.</p>
        </footer>
    </div>
</body>
</html>
